databases:
  - name: fintelligence-db
    plan: free
    databaseName: fintelligence
    user: fintelligence_user

services:
  - type: web
    name: fintelligence-api
    plan: free
    runtime: node
    rootDir: fintelligence-api
    buildCommand: npm install && npm run build
    startCommand: npx prisma migrate deploy && node dist/index.js
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: fintelligence-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SETU_CLIENT_ID
        sync: false
      - key: SETU_CLIENT_SECRET
        sync: false
      - key: SETU_PRODUCT_INSTANCE_ID
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: UPSTOX_ACCESS_TOKEN
        sync: false
      - key: TWELVE_DATA_API_KEY
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false

  - type: web
    name: fintelligence-ai
    plan: free
    runtime: python
    pythonVersion: "3.12.0"
    rootDir: fintelligence-ai
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: OPENAI_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
